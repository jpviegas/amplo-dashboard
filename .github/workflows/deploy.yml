name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$PATH:$(npm bin -g 2>/dev/null || true)"

            APP_DIR=/root/apps/amplo-dashboard
            REPO_URL=https://github.com/jpviegas/amplo-dashboard.git

            mkdir -p /root/apps
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            npm ci
            npm run build

            if pm2 describe amplo-dashboard > /dev/null 2>&1; then
              pm2 reload amplo-dashboard --update-env
            else
              pm2 start "npm run start" --name amplo-dashboard --time
            fi
            pm2 save
